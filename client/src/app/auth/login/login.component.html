<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <h3>Login</h3>
      </div>
      <div class="card-body">
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" formControlName="username" [class.is-invalid]="submitted && loginForm.get('username')?.invalid">
            <div class="invalid-feedback" *ngIf="submitted && loginForm.get('username')?.invalid">Username is required.</div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" formControlName="password" [class.is-invalid]="submitted && loginForm.get('password')?.invalid">
            <div class="invalid-feedback" *ngIf="submitted && loginForm.get('password')?.invalid">Password is required.</div>
          </div>
          <button type="submit" class="btn btn-primary" [disabled]="loginForm.invalid">Login</button>
        </form>
        <div class="mt-3" *ngIf="showError">
          <div class="alert alert-danger">{{ errorMessage }}</div>
        </div>
        <div class="mt-3">
          <p>Don't have an account? <a routerLink="/register">Register here</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
